<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>📖 我的收藏库</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- 页面顶部 -->
  <div class="container" style="padding-bottom:0">
    <div class="header">
      <div class="logo" onclick="renderHome()">📖 我的收藏库</div>
      <div class="header-right">
        <div class="search-box">
          <input type="text" id="searchInput" placeholder="搜索文章…" autocomplete="off">
        </div>
        <button class="btn btn-primary" onclick="showToast('直接发文章链接或内容给我，我来帮你添加')">＋ 添加</button>
      </div>
    </div>
  </div>

  <!-- 主应用区域 -->
  <div id="app" class="container">
    <div class="empty-state">
      <div class="icon">⏳</div>
      <h3>加载中...</h3>
    </div>
  </div>

  <!-- 悬浮 TOP 按钮 -->
  <div class="top-float" id="topFloat" onclick="window.scrollTo({top:0,behavior:'smooth'})">↑ TOP</div>

  <script src="app.js"></script>
</body>
</html>
